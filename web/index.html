<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Mini Battle Web</title>
    <script>
      window.global = window;
      window.process = window.process || {};
      window.process.env = window.process.env || {};
      window.process.versions = window.process.versions || { node: "20.0.0" };
      window.process.stdin = window.process.stdin || { fd: 0 };
      window.process.stdout = window.process.stdout || { fd: 1, write() {} };
      window.process.stderr = window.process.stderr || { fd: 2, write() {} };
    </script>
    <script type="module" src="./app/main.ts"></script>
  </head>
  <body>
    <div id="app"></div>
  </body>
